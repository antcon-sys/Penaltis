<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Penalty Overlay</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            font-family: 'Roboto', sans-serif;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #penalty-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60%;
            height: 16vh;
            background: rgba(10, 10, 10, 0.998);
            padding: 5px;
            border-radius: 40px;
            border-bottom: 5px solid #E65100;
            border-right: 5px solid #E65100;
            margin-top: 80vh;
            max-width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            margin: 10px 0 7px;
            letter-spacing: 3px;
            color: #ffffff;
        }

        .teams {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .team-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 5px 2px;
        }

        .team-name {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            text-transform: uppercase;
            width: 90%;
            font-size: 30px;
            margin-left: 3px;
            letter-spacing: 1.5px;
        }

        .shots {
            display: flex;
            gap: 12px;
            flex-grow: 1;
            justify-content: center;
        }

        .dot {
            display: flex;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s;
        }

        .goal {
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
            border-color: #fff;
            transform: scale(1.1);
            opacity: .8;
        }

        .miss {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            border-color: #fff;
            opacity: .85;
        }

        .scoreA1 {
            width: 50px;
            font-size: 50px;
            font-weight: bold;
            color: #ffff00;
            text-align: center;
            padding: 2px 7px 2px;
            margin-left: 15px;
            border-right: 2px solid rgba(255, 255, 255, 0.3);
        }

        .scoreB1 {
            width: 50px;
            font-size: 50px;
            font-weight: bold;
            color: #ffff00;
            text-align: center;
            padding: 2px 7px 2px;
            margin-right: 15px;
            border-left: 2px solid rgba(255, 255, 255, 0.3);
        }

        .score-center {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 2px;
        }

        .winner {
            margin: 2px 0 10px;
            font-size: 28px;
            color: #00ff00;
            letter-spacing: 3px;
            text-transform: uppercase;
            flex: 1 1 auto;
        }
    </style>
</head>

<body>
    <div id="penalty-container">
        <div class="header" id="status-header">CARREGANDO...</div>
        <div class="teams">
            <div class="team-row">
                <div class="team-name" id="display-name-a">TIME A</div>
                <div class="score-center">
                    <div class="shots" id="shots-a"></div>
                    <div class="scoreA1" id="score-a">0</div>
                </div>
            </div>
            <div class="team-row">
                <div class="score-center">
                    <div class="scoreB1" id="score-b">0</div>
                    <div class="shots" id="shots-b"></div>
                </div>
                <div class="team-name" id="display-name-b">TIME B</div>
            </div>
        </div>
        <div class="winner" id="winner-announcement"></div>
    </div>

    <script>

        // --- SUA CONFIGURAÇÃO MANTIDA ---
        const firebaseConfig = {
            apiKey: "AIzaSyCHKTA-mgIuWcVypfDkGrNhxtsynrUtq1Y",
            authDomain: "placar-live-53cc0.firebaseapp.com",
            projectId: "placar-live-53cc0",
            databaseURL: "https://placar-live-53cc0-default-rtdb.firebaseio.com",
            storageBucket: "placar-live-53cc0.firebasestorage.app",
            messagingSenderId: "291622264576",
            appId: "1:291622264576:web:1ca81d1333e4b0cb7b1de5",
            measurementId: "G-ZJPHJ42ECV"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('penalty_match').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('display-name-a').innerText = data.nameA;
                document.getElementById('display-name-b').innerText = data.nameB;
                document.getElementById('score-a').innerText = data.scoreA;
                document.getElementById('score-b').innerText = data.scoreB;
                document.getElementById('winner-announcement').innerText = data.winnerMsg || "";
                document.getElementById('status-header').innerText = data.headerText;
                renderDots('a', data.dotsA);
                renderDots('b', data.dotsB);
            }
        });

        function renderDots(team, dotClasses) {
            const container = document.getElementById(`shots-${team}`);
            container.innerHTML = '';
            dotClasses.forEach(className => {
                const dot = document.createElement('div');
                dot.className = `dot ${className}`;
                container.appendChild(dot);
            });
        }
    </script>
</body>

</html>
